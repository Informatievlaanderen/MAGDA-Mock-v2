# Publish JAR and docker image to Github packages
name: publish-artifacts
run-name: Publish artifacts to Github packages
on:
  push:
  workflow_dispatch: # allow manual triggering as well
env:
  REGISTRY: ghcr.io
  # Image name must be lower case
  IMAGE_NAME: informatievlaanderen/magda-mock-v2
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: mvn-cache
      - uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Publish
        # Disable artifactory profile and enable github for deployment.
        run: mvn --batch-mode deploy -P "!artifactory,github"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to docker registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push docker image
        uses: docker/build-push-action@v4
        with:
          context: magdaservice
          file: magdamock-spring/src/main/docker/Dockerfile-github
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
